{% set name = "ipyreact" %}
{% set version = "0.5.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/ipyreact-{{ version }}.tar.gz
  sha256: 398b37c57abbf3d453a0fb4bb34d39956f2de212276de053630ad907eabde9e5

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling >=1.3.1
    - hatch-jupyter-builder >=0.3.2
    - jupyterlab ==3.*
    - pip
  run:
    - python >={{ python_min }}
    - ipywidgets >=7.0.0
    - anywidget >=0.2.0

test:
  imports:
    - ipyreact
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/widgetti/ipyreact
  summary: React for ipywidgets that just works
  license: BSD-3-Clause
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - kolibril13
    - maartenbreddels
    - martinRenou
